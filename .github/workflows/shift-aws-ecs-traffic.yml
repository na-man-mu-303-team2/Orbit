name: Shift AWS ECS production traffic

on:
  workflow_dispatch:
    inputs:
      green_percentage:
        description: Green ECS traffic percentage
        type: choice
        options: ["5", "25", "50", "100", "0"]
        default: "5"
      route_primary_cloudfront:
        description: Route the existing primary CloudFront API origin through the blue/green ALB
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production-traffic-shift
  cancel-in-progress: false

jobs:
  shift:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      ECS_STACK_NAME: ${{ vars.AWS_ECS_PRODUCTION_STACK_NAME || 'orbit-main-production-ecs' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Require main
        run: test "$GITHUB_REF" = refs/heads/main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ECS_PRODUCTION_ROLE_ARN }}

      - name: Read stack state
        id: state
        shell: bash
        run: |
          set -euo pipefail
          stack="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --output json)"
          parameter() {
            jq -r --arg key "$1" \
              '.Stacks[0].Parameters[] | select(.ParameterKey == $key) | .ParameterValue' \
              <<<"$stack"
          }
          output() {
            jq -r --arg key "$1" \
              '.Stacks[0].Outputs[] | select(.OutputKey == $key) | .OutputValue' \
              <<<"$stack"
          }
          {
            echo "previous-blue=$(parameter BlueWeight)"
            echo "previous-green=$(parameter GreenWeight)"
            echo "distribution-id=$(output CloudFrontDistributionId)"
            echo "origin-domain=$(output OriginApiDomainName)"
            echo "candidate-url=$(output CandidateUrl)"
          } >>"$GITHUB_OUTPUT"

      - name: Create traffic change set
        id: change
        shell: bash
        env:
          GREEN: ${{ inputs.green_percentage }}
        run: |
          set -euo pipefail
          BLUE=$((100 - GREEN))
          current="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --query 'Stacks[0].Parameters' \
            --output json)"
          jq --arg blue "$BLUE" --arg green "$GREEN" '
            map(select(
              .ParameterKey != "BlueWeight" and
              .ParameterKey != "GreenWeight"
            ) | {ParameterKey, UsePreviousValue: true})
            + [
              {ParameterKey: "BlueWeight", ParameterValue: $blue},
              {ParameterKey: "GreenWeight", ParameterValue: $green}
            ]
          ' <<<"$current" >"${RUNNER_TEMP}/traffic-parameters.json"
          change_set="traffic-${GREEN}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws cloudformation create-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set" \
            --change-set-type UPDATE \
            --template-body file://infra/aws/main-production-ecs.yaml \
            --parameters "file://${RUNNER_TEMP}/traffic-parameters.json" \
            --capabilities CAPABILITY_NAMED_IAM \
            --description "Shift production ALB traffic to ${GREEN}% green"
          aws cloudformation wait change-set-create-complete \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set"
          aws cloudformation describe-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set" \
            --query '{Status:Status,Changes:Changes[].ResourceChange.{Action:Action,LogicalResourceId:LogicalResourceId,Replacement:Replacement}}'
          echo "name=$change_set" >>"$GITHUB_OUTPUT"

      - name: Execute traffic change set
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation execute-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "${{ steps.change.outputs.name }}"
          aws cloudformation wait stack-update-complete \
            --stack-name "$ECS_STACK_NAME"

      - name: Route primary CloudFront through ALB
        if: inputs.route_primary_cloudfront
        shell: bash
        run: |
          set -euo pipefail
          distribution_id="${{ steps.state.outputs.distribution-id }}"
          aws cloudfront get-distribution-config \
            --id "$distribution_id" >"${RUNNER_TEMP}/distribution.json"
          etag="$(jq -r '.ETag' "${RUNNER_TEMP}/distribution.json")"
          jq --arg domain "${{ steps.state.outputs.origin-domain }}" '
            .DistributionConfig
            | (.Origins.Items[] | select(.Id == "ec2-nginx-origin").DomainName) = $domain
            | (.Origins.Items[] | select(.Id == "ec2-nginx-origin").CustomOriginConfig.OriginProtocolPolicy) = "https-only"
            | (.Origins.Items[] | select(.Id == "ec2-nginx-origin").CustomOriginConfig.HTTPSPort) = 443
          ' "${RUNNER_TEMP}/distribution.json" >"${RUNNER_TEMP}/distribution-config.json"
          aws cloudfront update-distribution \
            --id "$distribution_id" \
            --if-match "$etag" \
            --distribution-config "file://${RUNNER_TEMP}/distribution-config.json" \
            --query 'Distribution.{Id:Id,Status:Status}'
          aws cloudfront wait distribution-deployed --id "$distribution_id"

      - name: Observe 30-minute gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          for minute in $(seq 1 30); do
            alarm_count="$(aws cloudwatch describe-alarms \
              --alarm-name-prefix orbit-main-production-ecs \
              --state-value ALARM \
              --query 'length(MetricAlarms)' \
              --output text)"
            test "$alarm_count" = "0"
            curl --fail --show-error --silent \
              "${{ steps.state.outputs.candidate-url }}/api/health" >/dev/null
            echo "Gate minute ${minute}/30 healthy."
            sleep 60
          done

      - name: Roll back listener weights on failure
        if: failure() && steps.change.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          current="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --query 'Stacks[0].Parameters' \
            --output json)"
          jq \
            --arg blue "${{ steps.state.outputs.previous-blue }}" \
            --arg green "${{ steps.state.outputs.previous-green }}" '
            map(select(
              .ParameterKey != "BlueWeight" and
              .ParameterKey != "GreenWeight"
            ) | {ParameterKey, UsePreviousValue: true})
            + [
              {ParameterKey: "BlueWeight", ParameterValue: $blue},
              {ParameterKey: "GreenWeight", ParameterValue: $green}
            ]
          ' <<<"$current" >"${RUNNER_TEMP}/rollback-parameters.json"
          rollback="traffic-rollback-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws cloudformation create-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$rollback" \
            --change-set-type UPDATE \
            --template-body file://infra/aws/main-production-ecs.yaml \
            --parameters "file://${RUNNER_TEMP}/rollback-parameters.json" \
            --capabilities CAPABILITY_NAMED_IAM \
            --description "Automatic rollback after failed traffic gate"
          aws cloudformation wait change-set-create-complete \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$rollback"
          aws cloudformation execute-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$rollback"
          aws cloudformation wait stack-update-complete \
            --stack-name "$ECS_STACK_NAME"
