name: Build and push images

# Build the env-agnostic backend images once in CI and push them to GHCR so the
# AWS (main) and personal staging (develop) deploys can pull prebuilt images
# instead of building on the deploy host. The env-specific web image is also
# built here, but only for personal staging (develop): its build args are baked
# in, so it is shared across staging deploys only, never with production (which
# builds web statically in the deploy workflow). This workflow only builds and
# pushes; it does not change how deploys run. AWS deploys keep building on-box
# until DEPLOY_USE_REGISTRY=true is set. See
# docs/runbooks/deploy-image-registry-migration.md.

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: worker
            dockerfile: infra/docker/worker.Dockerfile
          - name: python-worker
            dockerfile: infra/docker/python-worker.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service.name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  build-web:
    # The web image bakes its build-time args (APP_ENV/API_BASE_URL/WEB_PORT)
    # into the bundle, so it is environment-specific. Build it only for personal
    # staging (develop) using the same args as the web service in
    # docker-compose.staging.yml, so the pulled image is identical to what an
    # on-box build would produce. Keep these args in sync with that compose file.
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          build-args: |
            APP_ENV=staging
            API_BASE_URL=http://api:3000
            WEB_PORT=5173
          tags: |
            ghcr.io/na-man-mu-303-team2/orbit-web:${{ github.sha }}
            ghcr.io/na-man-mu-303-team2/orbit-web:${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
