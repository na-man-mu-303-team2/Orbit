name: Build and push images

# Build the env-agnostic backend images once in CI and push them to GHCR so the
# AWS (main) and personal staging (develop) deploys can pull prebuilt images
# instead of building on the deploy host. This workflow only builds and pushes;
# it does not change how deploys run. Deploys keep building on-box until
# DEPLOY_USE_REGISTRY=true is set. See
# docs/runbooks/deploy-image-registry-migration.md.

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: worker
            dockerfile: infra/docker/worker.Dockerfile
          - name: python-worker
            dockerfile: infra/docker/python-worker.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service.name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
