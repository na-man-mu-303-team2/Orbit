name: Build and push images

# Build the env-agnostic backend images once in CI and push them to GHCR so the
# AWS (main) and personal staging (develop) deploys can pull prebuilt images
# instead of building on the deploy host. The env-specific web image is also
# built here, but only for personal staging (develop): its build args are baked
# in, so it is shared across staging deploys only, never with production (which
# builds web statically in the deploy workflow). This workflow only builds and
# pushes; it does not change how deploys run. AWS deploys keep building on-box
# until DEPLOY_USE_REGISTRY=true is set. See
# docs/runbooks/deploy-image-registry-migration.md.
#
# The backend images are multi-arch (linux/amd64 + linux/arm64): personal
# staging runs on amd64, but AWS production runs on arm64 (Graviton/t4g), so a
# single-arch image would fail to pull there. Each arch is built natively on its
# own runner and the two are merged into one manifest list per tag, so each
# deploy host pulls the matching architecture.

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Build each architecture on a native runner (no QEMU emulation): amd64 on
    # ubuntu-latest, arm64 on ubuntu-24.04-arm. Push by digest only; the merge
    # job assembles the per-arch digests into a single tagged manifest list.
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, python-worker]
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Prepare platform pair
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service }}.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.service }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.service }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    # Combine the per-architecture digests into one multi-arch manifest list per
    # tag (:<sha> and :<branch>), matching the tags the deploys pull.
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, python-worker]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.service }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          image="ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service }}"
          docker buildx imagetools create \
            -t "${image}:${{ github.sha }}" \
            -t "${image}:${{ github.ref_name }}" \
            $(printf "${image}@sha256:%s " *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/na-man-mu-303-team2/orbit-${{ matrix.service }}:${{ github.sha }}"

  build-web:
    # The web image bakes its build-time args (APP_ENV/API_BASE_URL/WEB_PORT)
    # into the bundle, so it is environment-specific. Build it only for personal
    # staging (develop) using the same args as the web service in
    # docker-compose.staging.yml, so the pulled image is identical to what an
    # on-box build would produce. Keep these args in sync with that compose file.
    # Staging runs on amd64, so a single-arch image is enough here.
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          build-args: |
            APP_ENV=staging
            API_BASE_URL=http://api:3000
            WEB_PORT=5173
          tags: |
            ghcr.io/na-man-mu-303-team2/orbit-web:${{ github.sha }}
            ghcr.io/na-man-mu-303-team2/orbit-web:${{ github.ref_name }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
