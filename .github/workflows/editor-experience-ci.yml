name: Editor Experience CI

on:
  pull_request:
    branches:
      - feature/editor-experience-overhaul
      - develop
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "services/python-worker/**"
      - "tests/e2e/editor-*.spec.ts"
      - "tests/e2e/authenticatedProject.ts"
      - "tests/e2e/editorFixtures.ts"
      - "infra/docker/**"
      - "infra/scripts/test-rehearsal-ownership-migration.sh"
      - ".github/workflows/editor-experience-ci.yml"
      - ".env.example"
      - ".env.*.example"
      - "docker-compose.yml"
      - "package.json"
      - "playwright.config.ts"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"

permissions:
  contents: read

concurrency:
  group: editor-experience-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare local environment
        run: cp .env.example .env.local
      - name: Check environment contract
        run: node infra/scripts/check-env.mjs
      - name: Build, lint, and test
        run: pnpm build && pnpm lint && pnpm test

  ownership-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run rehearsal ownership migration cycle
        run: pnpm test:editor:migrations

  editor-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PLAYWRIGHT_USE_SYSTEM_CHROME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare local environment
        run: cp .env.example .env.local
      - name: Start editor services
        run: docker compose up -d --build --wait --wait-timeout 240
      - name: Check system Chrome
        run: google-chrome --version
      - name: Run editor E2E
        run: pnpm test:editor:e2e
      - name: Print compose logs on failure
        if: failure()
        continue-on-error: true
        run: docker compose logs --no-color
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: editor-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop editor services
        if: always()
        run: docker compose down -v --remove-orphans
