# GitHub Actions 화면에 표시될 workflow 이름입니다.
name: TypeScript CI

# 이 workflow가 언제 실행될지 정합니다.
on:
  # Pull Request가 열리거나 업데이트될 때 실행합니다.
  pull_request:
    # PR의 대상 브랜치가 develop 또는 main일 때만 실행합니다.
    branches:
      # develop으로 들어가는 PR에서 실행합니다.
      - develop
      # main으로 들어가는 PR에서도 실행합니다.
      - main
    # 아래 파일들이 바뀐 PR에서만 실행합니다.
    paths:
      # 앱 코드가 바뀌면 실행합니다.
      - "apps/**"
      # 공통 패키지 코드가 바뀌면 실행합니다.
      - "packages/**"
      # TypeScript/Vitest/Playwright 테스트가 바뀌면 실행합니다.
      - "tests/**"
      # 루트 package.json이 바뀌면 실행합니다.
      - "package.json"
      # pnpm lockfile이 바뀌면 실행합니다.
      - "pnpm-lock.yaml"
      # pnpm workspace 설정이 바뀌면 실행합니다.
      - "pnpm-workspace.yaml"
      # turbo 빌드 설정이 바뀌면 실행합니다.
      - "turbo.json"
      # 모든 TypeScript 설정 파일이 바뀌면 실행합니다.
      - "tsconfig*.json"
      # 환경변수 예시 파일이 바뀌면 검증을 다시 실행합니다.
      - ".env.example"
      # staging/production 환경변수 예시 파일이 바뀌어도 검증을 다시 실행합니다.
      - ".env.*.example"
      # 환경변수 검증 스크립트가 바뀌면 실행합니다.
      - "infra/scripts/check-env.mjs"
      # 이 workflow 파일 자체가 바뀌면 실행합니다.
      - ".github/workflows/typescript-ci.yml"

  # develop 브랜치에 push가 발생했을 때도 실행합니다.
  push:
    # develop에 push될 때만 실행합니다.
    branches:
      # develop 브랜치를 감시합니다.
      - develop
    # 아래 파일들이 바뀐 push에서만 실행합니다.
    paths:
      # 앱 코드가 바뀌면 실행합니다.
      - "apps/**"
      # 공통 패키지 코드가 바뀌면 실행합니다.
      - "packages/**"
      # TypeScript/Vitest/Playwright 테스트가 바뀌면 실행합니다.
      - "tests/**"
      # 루트 package.json이 바뀌면 실행합니다.
      - "package.json"
      # pnpm lockfile이 바뀌면 실행합니다.
      - "pnpm-lock.yaml"
      # pnpm workspace 설정이 바뀌면 실행합니다.
      - "pnpm-workspace.yaml"
      # turbo 빌드 설정이 바뀌면 실행합니다.
      - "turbo.json"
      # 모든 TypeScript 설정 파일이 바뀌면 실행합니다.
      - "tsconfig*.json"
      # 환경변수 예시 파일이 바뀌면 검증을 다시 실행합니다.
      - ".env.example"
      # staging/production 환경변수 예시 파일이 바뀌어도 검증을 다시 실행합니다.
      - ".env.*.example"
      # 환경변수 검증 스크립트가 바뀌면 실행합니다.
      - "infra/scripts/check-env.mjs"
      # 이 workflow 파일 자체가 바뀌면 실행합니다.
      - ".github/workflows/typescript-ci.yml"

# workflow가 GitHub 저장소 내용을 읽을 수 있게 최소 권한만 줍니다.
permissions:
  # 코드를 checkout하기 위해 read 권한만 사용합니다.
  contents: read

# 같은 브랜치에서 새 실행이 시작되면 이전 실행을 취소합니다.
concurrency:
  # workflow 이름과 브랜치/ref를 묶어서 같은 작업 그룹으로 봅니다.
  group: typescript-ci-${{ github.workflow }}-${{ github.ref }}
  # 새 commit이 올라오면 이전 CI 실행은 취소합니다.
  cancel-in-progress: true

# 실제로 실행할 작업 목록입니다.
jobs:
  # TypeScript 검증 job의 ID입니다.
  typescript:
    # GitHub Actions 화면에 표시될 job 이름입니다.
    name: typescript
    # Ubuntu 최신 runner에서 실행합니다.
    runs-on: ubuntu-latest
    # 20분 넘게 걸리면 실패 처리합니다.
    timeout-minutes: 20

    # job 안에서 순서대로 실행할 단계들입니다.
    steps:
      # 저장소 코드를 runner로 내려받습니다.
      - name: Checkout
        # GitHub 공식 checkout action을 사용합니다.
        uses: actions/checkout@v4

      # pnpm 패키지 매니저를 설치합니다.
      - name: Setup pnpm
        # pnpm 공식 setup action을 사용합니다.
        uses: pnpm/action-setup@v4
        # pnpm 설정값입니다.
        with:
          # 프로젝트 packageManager와 같은 pnpm 버전을 사용합니다.
          version: 10.12.4

      # Node.js를 설치하고 pnpm 캐시를 설정합니다.
      - name: Setup Node
        # GitHub 공식 Node setup action을 사용합니다.
        uses: actions/setup-node@v4
        # Node 설정값입니다.
        with:
          # 기존 CI와 같은 Node.js 24를 사용합니다.
          node-version: 24
          # pnpm 의존성 캐시를 사용합니다.
          cache: pnpm

      # lockfile 기준으로 의존성을 설치합니다.
      - name: Install dependencies
        # CI에서는 lockfile과 package.json이 어긋나면 실패하게 둡니다.
        run: pnpm install --frozen-lockfile

      # 로컬 환경변수 예시 파일을 테스트용 env 파일로 복사합니다.
      - name: Prepare local env
        # 비밀값 없이 .env.example만 사용합니다.
        run: cp .env.example .env.local

      # 환경변수 계약이 깨지지 않았는지 확인합니다.
      - name: Check environment contract
        # infra/scripts/check-env.mjs를 실행합니다.
        run: node infra/scripts/check-env.mjs

      # TypeScript 전체 빌드를 실행합니다.
      - name: Build
        # 루트 build script는 turbo run build입니다.
        run: pnpm build

      # TypeScript/ESLint 계열 lint를 실행합니다.
      - name: Lint
        # 루트 lint script는 turbo run lint입니다.
        run: pnpm lint

      # TypeScript/Vitest 테스트를 실행합니다.
      - name: Test
        # 루트 test script는 turbo run test입니다.
        run: pnpm test
