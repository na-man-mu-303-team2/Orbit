name: Deploy AWS ECS candidate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Create a non-executed change set or activate the candidate
        type: choice
        options: [plan, activate]
        default: plan
      publish_static_web:
        description: Publish the same commit's web bundle after candidate health succeeds
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production-ecs-candidate
  cancel-in-progress: false

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      ECS_STACK_NAME: ${{ vars.AWS_ECS_PRODUCTION_STACK_NAME || 'orbit-main-production-ecs' }}

    steps:
      - name: Require main
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ECS_PRODUCTION_ROLE_ARN }}

      - name: Read ECS stack outputs
        id: stack
        shell: bash
        run: |
          set -euo pipefail
          outputs="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output json)"
          value() {
            jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue' <<<"$outputs"
          }
          {
            echo "api-repository=$(value ApiRepositoryUri)"
            echo "worker-repository=$(value WorkerRepositoryUri)"
            echo "python-repository=$(value PythonWorkerRepositoryUri)"
            echo "cluster=$(value ClusterName)"
            echo "api-service=$(value ApiServiceName)"
            echo "worker-service=$(value WorkerServiceName)"
            echo "python-service=$(value PythonWorkerServiceName)"
            echo "migration-task=$(value MigrationTaskDefinitionArn)"
            echo "subnet-a=$(value AppPrivateSubnetAId)"
            echo "subnet-b=$(value AppPrivateSubnetBId)"
            echo "task-sg=$(value TaskSecurityGroupId)"
            echo "candidate-url=$(value CandidateUrl)"
            echo "static-bucket=$(value StaticWebBucketName)"
            echo "distribution-id=$(value CloudFrontDistributionId)"
          } >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check immutable image tags
        id: images
        shell: bash
        run: |
          set -euo pipefail
          check() {
            local output_name="$1"
            local repository_uri="$2"
            local repository_name="${repository_uri#*/}"
            if aws ecr describe-images \
              --repository-name "$repository_name" \
              --image-ids "imageTag=${GITHUB_SHA}" >/dev/null 2>&1; then
              echo "${output_name}=true" >>"$GITHUB_OUTPUT"
            else
              echo "${output_name}=false" >>"$GITHUB_OUTPUT"
            fi
          }
          check api-exists "${{ steps.stack.outputs.api-repository }}"
          check worker-exists "${{ steps.stack.outputs.worker-repository }}"
          check python-exists "${{ steps.stack.outputs.python-repository }}"

      - name: Build and push API image
        if: steps.images.outputs.api-exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.stack.outputs.api-repository }}:${{ github.sha }}
          cache-from: type=gha,scope=ecs-api-arm64
          cache-to: type=gha,mode=max,scope=ecs-api-arm64

      - name: Build and push Worker image
        if: steps.images.outputs.worker-exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.stack.outputs.worker-repository }}:${{ github.sha }}
          cache-from: type=gha,scope=ecs-worker-arm64
          cache-to: type=gha,mode=max,scope=ecs-worker-arm64

      - name: Build and push Python Worker image
        if: steps.images.outputs.python-exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/python-worker.Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.stack.outputs.python-repository }}:${{ github.sha }}
          cache-from: type=gha,scope=ecs-python-worker-arm64
          cache-to: type=gha,mode=max,scope=ecs-python-worker-arm64

      - name: Create task-definition change set
        id: taskdefs
        shell: bash
        run: |
          set -euo pipefail
          current="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --query 'Stacks[0].Parameters' \
            --output json)"
          jq --arg tag "$GITHUB_SHA" '
            map(select(
              .ParameterKey != "ImageTag" and
              .ParameterKey != "CandidateServicesEnabled"
            ) | {ParameterKey, UsePreviousValue: true})
            + [
              {ParameterKey: "ImageTag", ParameterValue: $tag},
              {ParameterKey: "CandidateServicesEnabled", ParameterValue: "false"}
            ]
          ' <<<"$current" >"${RUNNER_TEMP}/taskdefs-parameters.json"

          change_set="candidate-taskdefs-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws cloudformation create-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set" \
            --change-set-type UPDATE \
            --template-body file://infra/aws/main-production-ecs.yaml \
            --parameters "file://${RUNNER_TEMP}/taskdefs-parameters.json" \
            --capabilities CAPABILITY_NAMED_IAM \
            --description "Pin ECS task definitions to ${GITHUB_SHA}; services remain at zero"
          aws cloudformation wait change-set-create-complete \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set"
          aws cloudformation describe-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set" \
            --query '{Status:Status,ExecutionStatus:ExecutionStatus,Changes:Changes[].ResourceChange.{Action:Action,LogicalResourceId:LogicalResourceId,Replacement:Replacement}}'
          echo "name=$change_set" >>"$GITHUB_OUTPUT"

      - name: Stop after plan
        if: inputs.mode == 'plan'
        run: echo "Change set created and intentionally left unexecuted."

      - name: Execute task-definition change set
        if: inputs.mode == 'activate'
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation execute-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "${{ steps.taskdefs.outputs.name }}"
          aws cloudformation wait stack-update-complete \
            --stack-name "$ECS_STACK_NAME"

      - name: Run expand-contract migrations
        if: inputs.mode == 'activate'
        shell: bash
        run: |
          set -euo pipefail
          task_arn="$(aws ecs run-task \
            --cluster "${{ steps.stack.outputs.cluster }}" \
            --launch-type FARGATE \
            --task-definition orbit-production-migration \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.stack.outputs.subnet-a }},${{ steps.stack.outputs.subnet-b }}],securityGroups=[${{ steps.stack.outputs.task-sg }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)"
          test -n "$task_arn"
          test "$task_arn" != "None"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.stack.outputs.cluster }}" \
            --tasks "$task_arn"
          exit_code="$(aws ecs describe-tasks \
            --cluster "${{ steps.stack.outputs.cluster }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"
          test "$exit_code" = "0"

      - name: Activate candidate services
        if: inputs.mode == 'activate'
        shell: bash
        run: |
          set -euo pipefail
          current="$(aws cloudformation describe-stacks \
            --stack-name "$ECS_STACK_NAME" \
            --query 'Stacks[0].Parameters' \
            --output json)"
          jq '
            map(select(.ParameterKey != "CandidateServicesEnabled") |
              {ParameterKey, UsePreviousValue: true})
            + [{ParameterKey: "CandidateServicesEnabled", ParameterValue: "true"}]
          ' <<<"$current" >"${RUNNER_TEMP}/activate-parameters.json"

          change_set="candidate-services-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws cloudformation create-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set" \
            --change-set-type UPDATE \
            --template-body file://infra/aws/main-production-ecs.yaml \
            --parameters "file://${RUNNER_TEMP}/activate-parameters.json" \
            --capabilities CAPABILITY_NAMED_IAM \
            --description "Activate ECS candidate services for ${GITHUB_SHA}"
          aws cloudformation wait change-set-create-complete \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set"
          aws cloudformation execute-change-set \
            --stack-name "$ECS_STACK_NAME" \
            --change-set-name "$change_set"
          aws cloudformation wait stack-update-complete \
            --stack-name "$ECS_STACK_NAME"

      - name: Wait for ECS services
        if: inputs.mode == 'activate'
        shell: bash
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${{ steps.stack.outputs.cluster }}" \
            --services \
              "${{ steps.stack.outputs.api-service }}" \
              "${{ steps.stack.outputs.worker-service }}" \
              "${{ steps.stack.outputs.python-service }}"

      - name: Verify candidate
        if: inputs.mode == 'activate'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            "${{ steps.stack.outputs.candidate-url }}/api/health"
          curl --fail --show-error --silent \
            "${{ steps.stack.outputs.candidate-url }}/socket.io/?EIO=4&transport=polling" \
            >/dev/null

      - name: Setup pnpm
        if: inputs.mode == 'activate' && inputs.publish_static_web
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        if: inputs.mode == 'activate' && inputs.publish_static_web
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Publish same-commit static web
        if: inputs.mode == 'activate' && inputs.publish_static_web
        shell: bash
        env:
          NODE_ENV: production
          APP_ENV: production
          WEB_PORT: "5173"
          API_BASE_URL: https://tryorbit.site
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm --filter @orbit/web... --workspace-concurrency=1 build
          aws s3 sync apps/web/dist "s3://${{ steps.stack.outputs.static-bucket }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.distribution-id }}" \
            --paths "/*"
