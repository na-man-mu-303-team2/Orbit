name: Apply AWS infrastructure

on:
  workflow_dispatch:
    inputs:
      change_set_arn:
        description: Previously reviewed CloudFormation change set ARN
        required: true
        type: string
      region:
        description: Deployment region (use us-east-1 for edge WAF)
        required: true
        default: ap-northeast-2
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production-infrastructure-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Require AWS deployment role configuration
        env:
          AWS_INFRA_APPLY_ROLE_ARN: ${{ vars.AWS_INFRA_APPLY_ROLE_ARN }}
        run: |
          set -euo pipefail
          : "${AWS_INFRA_APPLY_ROLE_ARN:?Production variable AWS_INFRA_APPLY_ROLE_ARN must be configured}"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: ${{ vars.AWS_INFRA_APPLY_ROLE_ARN }}
      - name: Recheck reviewed change set before execution
        run: |
          set -euo pipefail
          aws cloudformation describe-change-set --change-set-name "${{ inputs.change_set_arn }}" --region "${{ inputs.region }}" --output json > change-set.json
          node infra/scripts/assert-cfn-change-set-safe.mjs change-set.json
      - name: Execute approved change set
        run: |
          set -euo pipefail
          aws cloudformation describe-change-set --change-set-name "${{ inputs.change_set_arn }}" --region "${{ inputs.region }}" --output json > approved-change-set.json
          node infra/scripts/assert-cfn-change-set-safe.mjs approved-change-set.json
          stack_id="$(jq -r '.StackId' approved-change-set.json)"
          change_set_type="$(jq -r '.ChangeSetType' approved-change-set.json)"
          aws cloudformation execute-change-set --change-set-name "${{ inputs.change_set_arn }}" --region "${{ inputs.region }}"
          if [ "$change_set_type" = "CREATE" ]; then
            aws cloudformation wait stack-create-complete --stack-name "$stack_id" --region "${{ inputs.region }}"
          else
            aws cloudformation wait stack-update-complete --stack-name "$stack_id" --region "${{ inputs.region }}"
          fi
          aws cloudformation describe-stacks --stack-name "$stack_id" --region "${{ inputs.region }}" --output json > applied-stack.json
      - name: Upload apply evidence
        uses: actions/upload-artifact@v4
        with:
          name: cloudformation-apply-${{ github.run_id }}
          path: |
            approved-change-set.json
            applied-stack.json
          retention-days: 30
