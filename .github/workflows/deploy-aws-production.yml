name: Deploy AWS Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_STACK_NAME: ${{ vars.AWS_PRODUCTION_STACK_NAME || 'orbit-main-production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_PRODUCTION_ROLE_ARN }}

      - name: Read production stack outputs
        id: stack
        shell: bash
        run: |
          set -euo pipefail

          outputs="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$AWS_STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output json)"

          value() {
            jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue' <<<"$outputs"
          }

          static_bucket="$(value StaticWebBucketName)"
          distribution_id="$(value CloudFrontDistributionId)"
          distribution_domain="$(value CloudFrontDomainName)"
          instance_id="$(value Ec2InstanceId)"

          for item in static_bucket distribution_id distribution_domain instance_id; do
            if [ -z "${!item}" ] || [ "${!item}" = "null" ]; then
              echo "Missing CloudFormation output: $item" >&2
              exit 1
            fi
          done

          {
            echo "static-bucket=$static_bucket"
            echo "distribution-id=$distribution_id"
            echo "distribution-domain=$distribution_domain"
            echo "instance-id=$instance_id"
            echo "public-url=https://$distribution_domain"
          } >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web
        env:
          NODE_ENV: production
          APP_ENV: production
          WEB_PORT: "5173"
          API_BASE_URL: https://${{ steps.stack.outputs.distribution-domain }}
        run: pnpm --filter @orbit/web... --workspace-concurrency=1 build

      - name: Deploy static web to S3
        run: |
          set -euo pipefail
          aws s3 sync apps/web/dist "s3://${{ steps.stack.outputs.static-bucket }}" \
            --region "$AWS_REGION" \
            --delete

      - name: Deploy API and workers on EC2
        id: ec2-deploy
        shell: bash
        run: |
          set -euo pipefail

          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.stack.outputs.instance-id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ORBIT main production" \
            --parameters commands='["sudo /usr/local/sbin/orbit-deploy-aws-production"]' \
            --query 'Command.CommandId' \
            --output text)"

          echo "command-id=$command_id" >> "$GITHUB_OUTPUT"

          if ! aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.stack.outputs.instance-id }}"; then
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "${{ steps.stack.outputs.instance-id }}" \
              --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
              --output json
            exit 1
          fi

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "${{ steps.stack.outputs.instance-id }}" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.distribution-id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text

      - name: Verify CloudFront API health
        run: |
          set -euo pipefail
          curl -fsS "https://${{ steps.stack.outputs.distribution-domain }}/api/health"

      - name: Verify CloudFront Socket.IO routing
        run: |
          set -euo pipefail
          curl -fsS "https://${{ steps.stack.outputs.distribution-domain }}/socket.io/?EIO=4&transport=polling" >/dev/null

      - name: Verify CloudFront static web
        run: |
          set -euo pipefail
          curl -fsSI "https://${{ steps.stack.outputs.distribution-domain }}/" >/dev/null
