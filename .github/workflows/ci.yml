name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: cp .env.example .env.local
      - run: node infra/scripts/check-env.mjs
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  python-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: services/python-worker
        run: uv sync
      - working-directory: services/python-worker
        run: uv run ruff check .
      - working-directory: services/python-worker
        run: uv run mypy app
      - working-directory: services/python-worker
        run: uv run pytest

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare local env file for compose validation
        run: cp .env.example .env.local
      - run: docker compose config
