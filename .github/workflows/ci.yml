name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
      - develop

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.classify.outputs.typescript }}
      python_worker: ${{ steps.classify.outputs.python_worker }}
      compose_config: ${{ steps.classify.outputs.compose_config }}
      playwright_smoke: ${{ steps.classify.outputs.playwright_smoke }}
      automation_check: ${{ steps.classify.outputs.automation_check }}
      automation_lint: ${{ steps.classify.outputs.automation_lint }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      automation_only: ${{ steps.classify.outputs.automation_only }}
      workflow_changed: ${{ steps.classify.outputs.workflow_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          emit() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            emit typescript true
            emit python_worker true
            emit compose_config true
            emit playwright_smoke true
            emit automation_check false
            emit automation_lint false
            emit docs_only false
            emit automation_only false
            emit workflow_changed false
            exit 0
          fi

          git diff --name-only --find-renames "${{ github.event.pull_request.base.sha }}" HEAD > changed-files.txt

          has_files=false
          all_docs=true
          all_docs_or_automation=true
          has_automation=false
          typescript=false
          python_worker=false
          compose_config=false
          playwright_smoke=false
          automation_lint=false
          workflow_changed=false

          is_doc_path() {
            case "$1" in
              docs/*|README.md|AGENTS.md|*.md) return 0 ;;
              *) return 1 ;;
            esac
          }

          is_automation_path() {
            case "$1" in
              .github/*|infra/scripts/*|package.json|.gitignore) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            has_files=true

            if ! is_doc_path "$file"; then
              all_docs=false
            fi

            if is_automation_path "$file"; then
              has_automation=true
            elif ! is_doc_path "$file"; then
              all_docs_or_automation=false
            fi

            case "$file" in
              .github/workflows/*)
                workflow_changed=true
                typescript=true
                python_worker=true
                compose_config=true
                playwright_smoke=true
                ;;
              package.json)
                automation_lint=true
                ;;
              apps/*|packages/*|tests/*|playwright.config.*|tsconfig*.json|turbo.json|pnpm-lock.yaml)
                typescript=true
                ;;
            esac

            case "$file" in
              services/python-worker/*|infra/docker/python-worker.Dockerfile|uv.lock)
                python_worker=true
                ;;
            esac

            case "$file" in
              docker-compose.yml|infra/docker/*|.env.example|.env.*.example|apps/api/*|apps/web/*|services/python-worker/*|packages/config/*|packages/storage/*|packages/job-queue/*)
                compose_config=true
                ;;
            esac

            case "$file" in
              apps/api/*|apps/web/*|packages/shared/*|packages/config/*|packages/storage/*|docker-compose.yml|infra/docker/*|tests/e2e/*|playwright.config.*|.env.example|.env.*.example)
                playwright_smoke=true
                ;;
            esac
          done < changed-files.txt

          docs_only=false
          automation_only=false
          automation_check=false

          if [ "$has_files" = true ] && [ "$all_docs" = true ] && [ "$has_automation" = false ]; then
            docs_only=true
          fi

          if [ "$has_files" = true ] && [ "$has_automation" = true ] && [ "$all_docs_or_automation" = true ] && [ "$workflow_changed" = false ]; then
            automation_only=true
          fi

          if [ "$docs_only" = true ] || [ "$has_automation" = true ] || [ "$workflow_changed" = true ]; then
            automation_check=true
          fi

          emit typescript "$typescript"
          emit python_worker "$python_worker"
          emit compose_config "$compose_config"
          emit playwright_smoke "$playwright_smoke"
          emit automation_check "$automation_check"
          emit automation_lint "$automation_lint"
          emit docs_only "$docs_only"
          emit automation_only "$automation_only"
          emit workflow_changed "$workflow_changed"

  automation-check:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: >
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.automation_check == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build changed-file list
        shell: bash
        run: git diff --name-only --find-renames "${{ github.event.pull_request.base.sha }}" HEAD > changed-files.txt
      - name: Validate changed Markdown can be read as UTF-8
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const changedFiles = fs.readFileSync("changed-files.txt", "utf8").split(/\r?\n/).filter(Boolean);
          const markdownFiles = changedFiles.filter((file) => file.endsWith(".md") || file === "AGENTS.md");
          for (const file of markdownFiles) {
            if (fs.existsSync(file)) {
              fs.readFileSync(file, "utf8");
            }
          }
          console.log(`Validated UTF-8 Markdown files: ${markdownFiles.length}`);
          NODE
      - name: Validate automation JSON and script syntax
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          for (const file of ["package.json"]) {
            if (fs.existsSync(file)) {
              JSON.parse(fs.readFileSync(file, "utf8"));
            }
          }
          NODE
          for file in infra/scripts/*.mjs; do
            node --check "$file"
          done
      - uses: pnpm/action-setup@v4
        if: needs.detect-changes.outputs.automation_lint == 'true'
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        if: needs.detect-changes.outputs.automation_lint == 'true'
        with:
          node-version: 24
          cache: pnpm
      - if: needs.detect-changes.outputs.automation_lint == 'true'
        run: pnpm install --frozen-lockfile=false
      - if: needs.detect-changes.outputs.automation_lint == 'true'
        run: pnpm lint

  typescript:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: >
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.typescript == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: cp .env.example .env.local
      - run: node infra/scripts/check-env.mjs
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  python-worker:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: >
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.python_worker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: services/python-worker
        run: uv sync
      - working-directory: services/python-worker
        run: uv run ruff check .
      - working-directory: services/python-worker
        run: uv run mypy app
      - working-directory: services/python-worker
        run: uv run pytest

  compose-config:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: >
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.compose_config == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Prepare local env file for compose validation
        run: cp .env.example .env.local
      - run: docker compose config --quiet

  playwright-smoke:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    # Temporarily disabled while smoke stability is reviewed.
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm exec playwright install --with-deps chromium
      - name: Prepare local env file for smoke services
        run: cp .env.example .env.local
      - name: Start API and web smoke services
        run: docker compose up --build -d api web
      - name: Run smoke database migrations
        run: pnpm db:migration:run
      - name: Wait for smoke endpoints
        run: |
          for url in http://127.0.0.1:3000/health http://127.0.0.1:5173; do
            for attempt in $(seq 1 60); do
              if curl --max-time 5 -fsS "$url" > /dev/null; then
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $url"
                exit 1
              fi
              sleep 2
            done
          done
      - name: Run Playwright smoke
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          ORBIT_API_URL: http://localhost:3000
        run: pnpm test:smoke
      - name: Show smoke service status
        if: always()
        run: docker compose ps
      - name: Show smoke service logs
        if: failure()
        run: docker compose logs --tail=200 api web
      - name: Stop smoke services
        if: always()
        run: docker compose down --remove-orphans
