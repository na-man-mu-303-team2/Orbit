name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: cp .env.example .env.local
      - run: node infra/scripts/check-env.mjs
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  python-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: services/python-worker
        run: uv sync
      - working-directory: services/python-worker
        run: uv run ruff check .
      - working-directory: services/python-worker
        run: uv run mypy app
      - working-directory: services/python-worker
        run: uv run pytest

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare local env file for compose validation
        run: cp .env.example .env.local
      - run: docker compose config --quiet

  playwright-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm exec playwright install --with-deps chromium
      - name: Prepare local env file for smoke services
        run: cp .env.example .env.local
      - name: Start API and web smoke services
        run: docker compose up --build -d api web
      - name: Run smoke database migrations
        run: pnpm db:migration:run
      - name: Wait for smoke endpoints
        run: |
          for url in http://127.0.0.1:3000/health http://127.0.0.1:5173; do
            for attempt in $(seq 1 60); do
              if curl -fsS "$url" > /dev/null; then
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $url"
                exit 1
              fi
              sleep 2
            done
          done
      - name: Run Playwright smoke
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          ORBIT_API_URL: http://127.0.0.1:3000
        run: pnpm test:smoke
      - name: Show smoke service status
        if: always()
        run: docker compose ps
      - name: Stop smoke services
        if: always()
        run: docker compose down --remove-orphans
