name: Environment Contract CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_personal_staging:
        description: 환경 계약 검증 후 personal staging full 배포 실행
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: environment-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  environment-contract:
    name: environment-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate environment contract
        run: |
          bash -n infra/scripts/orbit-deploy-personal-staging-wrapper.sh
          node infra/scripts/check-env.mjs
          node --test infra/scripts/personal-staging-env.test.mjs infra/scripts/personal-staging-wrapper.test.mjs

  deploy-personal-staging:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/develop' &&
      inputs.deploy_personal_staging)
    needs:
      - environment-contract
    uses: ./.github/workflows/deploy-personal-staging.yml
    with:
      deployment_mode: full
      expected_sha: ${{ github.sha }}
      trigger_source: ${{ github.event_name == 'push' && 'develop-push' || 'manual-recovery' }}
