name: Environment Contract CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: environment-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment-contract:
    name: environment-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate environment contract
        run: node infra/scripts/check-env.mjs

  deploy-personal-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs:
      - environment-contract
    uses: ./.github/workflows/deploy-personal-staging.yml
    with:
      deployment_mode: full
      expected_sha: ${{ github.sha }}
      trigger_source: develop-push
