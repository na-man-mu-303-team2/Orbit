name: Adaptive Coaching CI

on:
  pull_request:
    branches: [main, develop]
    paths: ["apps/**", "packages/**", "services/python-worker/**", "tests/e2e/**", "infra/scripts/test-adaptive-coaching-*", ".github/workflows/adaptive-coaching-ci.yml", "playwright.config.ts", "package.json", "pnpm-lock.yaml"]

permissions:
  contents: read

jobs:
  unit-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: node infra/scripts/check-env.mjs
      - run: pnpm build && pnpm lint && pnpm test
  db-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: pnpm test:coaching:migrations
      - run: pnpm test:coaching:integration
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: pnpm test:coaching:python
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: docker compose up -d --build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:coaching:e2e
