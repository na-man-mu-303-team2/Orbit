name: Adaptive Coaching CI

on:
  pull_request:
    branches: [main, develop]
    paths: ["apps/**", "packages/**", "services/python-worker/**", "tests/e2e/**", "infra/scripts/test-adaptive-coaching-*", ".github/workflows/adaptive-coaching-ci.yml", "playwright.config.ts", "package.json", "pnpm-lock.yaml"]

permissions:
  contents: read

jobs:
  db-integration:
    runs-on: ubuntu-latest
    # LibreOffice apt 설치가 느린 미러를 만나면 이전엔 20분 타임아웃에 걸렸다.
    # 아래 apt 캐싱과 함께 캐시 미스(최초/만료) 실행을 위한 여유로 30분으로 둔다.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - uses: astral-sh/setup-uv@v6
      # LibreOffice Impress + Noto CJK 폰트는 매 실행마다 apt로 새로 받으면 느리다(70MB+).
      # 다운로드한 .deb와 설치 파일을 캐시해 재다운로드를 없앤다. version은 캐시 무효화용 키.
      - name: Install LibreOffice + CJK fonts (apt cache)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libreoffice-impress fonts-noto-cjk
          version: "1.0"
          execute_install_scripts: true
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: pnpm test:coaching:migrations
      - run: pnpm test:coaching:integration
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: astral-sh/setup-uv@v6
      - run: pnpm test:coaching:python
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PLAYWRIGHT_USE_SYSTEM_CHROME: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: docker compose up -d --build
      - run: google-chrome --version
      - run: pnpm test:coaching:e2e
