name: Deploy Personal Staging

on:
  workflow_call:
    inputs:
      expected_sha:
        description: Environment Contract CI를 통과한 develop commit SHA
        required: true
        type: string
  workflow_dispatch:
    inputs:
      expected_sha:
        description: 선택 사항. 비워두면 최신 develop을 배포합니다.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: personal-staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, orbit-personal-staging]
    timeout-minutes: 30
    environment: personal-staging
    steps:
      - name: Deploy environment-CI validated develop commit
        if: inputs.expected_sha != ''
        shell: bash
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: sudo /usr/local/sbin/orbit-deploy-personal-staging "$EXPECTED_SHA"

      - name: Deploy develop manually
        if: inputs.expected_sha == ''
        shell: bash
        run: sudo /usr/local/sbin/orbit-deploy-personal-staging
