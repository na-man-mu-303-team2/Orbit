name: Deploy Personal Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      trigger:
        description: "Deployment trigger source, for example manual or doppler-stg-secrets-update."
        required: false
        default: "manual"
      doppler_config:
        description: "Doppler config metadata for webhook-triggered redeploys."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: personal-staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, orbit-personal-staging]
    timeout-minutes: 30
    environment: personal-staging
    steps:
      - name: Deploy develop on personal server
        shell: bash
        run: sudo /usr/local/sbin/orbit-deploy-personal-staging
