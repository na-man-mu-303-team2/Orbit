name: Jira Complete Issue

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  complete-jira-issue:
    if: >
      github.event.pull_request.merged == true &&
      contains(fromJSON('["main","develop"]'), github.event.pull_request.base.ref)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Jira webhook payload
        id: jira_payload
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY_JSON: ${{ toJSON(github.event.pull_request.body) }}
        run: node infra/scripts/build-jira-webhook-payload.mjs > jira-payload.json

      - name: Trigger Jira Automation
        if: steps.jira_payload.outputs.has_issues == 'true'
        shell: bash
        env:
          JIRA_AUTOMATION_WEBHOOK_URL: ${{ secrets.JIRA_AUTOMATION_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "$JIRA_AUTOMATION_WEBHOOK_URL" ]; then
            echo "::error::JIRA_AUTOMATION_WEBHOOK_URL repository secret is not configured."
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data @jira-payload.json \
            "$JIRA_AUTOMATION_WEBHOOK_URL"
