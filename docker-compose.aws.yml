name: orbit-production

x-env-file: &env-file
  - ${ORBIT_ENV_FILE:-/etc/orbit/production.env}

x-awslogs: &awslogs
  driver: awslogs
  options:
    awslogs-region: ${AWS_REGION:-ap-northeast-2}
    awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
    awslogs-create-group: "false"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: redis
        awslogs-create-group: "false"

  private-evidence-redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: private-evidence-redis
        awslogs-create-group: "false"

  api:
    image: ghcr.io/na-man-mu-303-team2/orbit-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command:
      - /bin/sh
      - -lc
      - corepack pnpm --filter @orbit/api migration:run && corepack pnpm --filter @orbit/api start
    env_file: *env-file
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      API_PORT: 3000
      REDIS_URL: redis://redis:6379
      PRIVATE_EVIDENCE_REDIS_URL: redis://private-evidence-redis:6379
      PYTHON_WORKER_URL: http://python-worker:8000
      STORAGE_DRIVER: s3
      S3_FORCE_PATH_STYLE: "false"
      JOB_QUEUE_DRIVER: bullmq
      LOG_PRETTY: "false"
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      redis:
        condition: service_healthy
      private-evidence-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: api
        awslogs-create-group: "false"

  worker:
    image: ghcr.io/na-man-mu-303-team2/orbit-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: *env-file
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      REDIS_URL: redis://redis:6379
      PRIVATE_EVIDENCE_REDIS_URL: redis://private-evidence-redis:6379
      PYTHON_WORKER_URL: http://python-worker:8000
      STORAGE_DRIVER: s3
      S3_FORCE_PATH_STYLE: "false"
      JOB_QUEUE_DRIVER: bullmq
      LOG_PRETTY: "false"
    depends_on:
      redis:
        condition: service_healthy
      private-evidence-redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: worker
        awslogs-create-group: "false"

  python-worker:
    image: ghcr.io/na-man-mu-303-team2/orbit-python-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/docker/python-worker.Dockerfile
    env_file: *env-file
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      API_BASE_URL: http://api:3000
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: s3
      S3_FORCE_PATH_STYLE: "false"
      JOB_QUEUE_DRIVER: bullmq
      LOG_PRETTY: "false"
      PYTHON_WORKER_URL: http://python-worker:8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: python-worker
        awslogs-create-group: "false"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/aws-production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    logging:
      <<: *awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-2}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/orbit/production}
        awslogs-stream: nginx
        awslogs-create-group: "false"

volumes:
  redis-data:
