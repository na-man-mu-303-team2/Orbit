name: orbit

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: orbit
      MINIO_ROOT_PASSWORD: orbit-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 orbit orbit-password
        mc mb --ignore-existing local/orbit-local
        mc anonymous set download local/orbit-local

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://orbit:orbit@postgres:5432/orbit
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PYTHON_WORKER_URL: http://python-worker:8000
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://orbit:orbit@postgres:5432/orbit
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PYTHON_WORKER_URL: http://python-worker:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  python-worker:
    build:
      context: .
      dockerfile: infra/docker/python-worker.Dockerfile
    env_file:
      - .env.local
    ports:
      - "${PYTHON_WORKER_PORT:-8000}:8000"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env.local
    environment:
      API_BASE_URL: http://api:3000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  minio-data:
  postgres-data:
  redis-data:
