name: orbit

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: orbit
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  private-evidence-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: orbit
      MINIO_ROOT_PASSWORD: orbit-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 orbit orbit-password
        mc mb --ignore-existing local/orbit-local
        mc anonymous set download local/orbit-local

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command:
      - /bin/sh
      - -lc
      - pnpm --filter @orbit/api migration:run && pnpm --filter @orbit/api start
    env_file:
      - .env.local
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_TRUST_PROXY_HOPS: ${API_TRUST_PROXY_HOPS:-0}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgres://orbit:orbit@postgres:5432/orbit
      REDIS_URL: redis://redis:6379
      PRIVATE_EVIDENCE_REDIS_URL: redis://private-evidence-redis:6379
      S3_ENDPOINT: http://minio:9000
      PYTHON_WORKER_URL: http://python-worker:8000
      ADAPTIVE_REHEARSAL_COACH_ENABLED: "${ADAPTIVE_REHEARSAL_COACH_ENABLED:-true}"
      FOCUSED_PRACTICE_ENABLED: "${FOCUSED_PRACTICE_ENABLED:-true}"
      CHALLENGE_QNA_ENABLED: ${CHALLENGE_QNA_ENABLED:-false}
      SLIDE_PRACTICE_ENABLED: ${SLIDE_PRACTICE_ENABLED:-true}
      SLIDE_QUESTION_GUIDES_ENABLED: ${SLIDE_QUESTION_GUIDES_ENABLED:-true}
      DEMO_COACHING_FIXTURE_ENABLED: ${DEMO_COACHING_FIXTURE_ENABLED:-false}
      DEMO_FIXTURE_ENV_ALLOWLIST: ${DEMO_FIXTURE_ENV_ALLOWLIST:-}
      ADAPTIVE_COACHING_PROJECT_ALLOWLIST: "${ADAPTIVE_COACHING_PROJECT_ALLOWLIST:-*}"
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      private-evidence-redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env.local
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgres://orbit:orbit@postgres:5432/orbit
      REDIS_URL: redis://redis:6379
      PRIVATE_EVIDENCE_REDIS_URL: redis://private-evidence-redis:6379
      S3_ENDPOINT: http://minio:9000
      PYTHON_WORKER_URL: http://python-worker:8000
      ADAPTIVE_REHEARSAL_COACH_ENABLED: ${ADAPTIVE_REHEARSAL_COACH_ENABLED:-false}
      FOCUSED_PRACTICE_ENABLED: ${FOCUSED_PRACTICE_ENABLED:-false}
      CHALLENGE_QNA_ENABLED: ${CHALLENGE_QNA_ENABLED:-false}
      SLIDE_PRACTICE_ENABLED: ${SLIDE_PRACTICE_ENABLED:-true}
      SLIDE_QUESTION_GUIDES_ENABLED: ${SLIDE_QUESTION_GUIDES_ENABLED:-true}
      DEMO_COACHING_FIXTURE_ENABLED: ${DEMO_COACHING_FIXTURE_ENABLED:-false}
      DEMO_FIXTURE_ENV_ALLOWLIST: ${DEMO_FIXTURE_ENV_ALLOWLIST:-}
      ADAPTIVE_COACHING_PROJECT_ALLOWLIST: ${ADAPTIVE_COACHING_PROJECT_ALLOWLIST:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      private-evidence-redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  python-worker:
    build:
      context: .
      dockerfile: infra/docker/python-worker.Dockerfile
    env_file:
      - .env.local
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_BASE_URL: http://api:3000
      DATABASE_URL: postgres://orbit:orbit@postgres:5432/orbit
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      PYTHON_WORKER_URL: http://python-worker:8000
    ports:
      - "${PYTHON_WORKER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        APP_ENV: ${APP_ENV:-local}
        API_BASE_URL: ${API_BASE_URL:-http://api:3000}
        WEB_PORT: ${WEB_PORT:-5173}
    command: pnpm --filter @orbit/web dev
    env_file:
      - .env.local
    environment:
      APP_ENV: ${APP_ENV:-local}
      API_BASE_URL: http://api:3000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  minio-data:
  postgres18-data:
  redis-data:
