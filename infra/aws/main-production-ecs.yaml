  PythonWorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: orbit-production-python-worker
      Cpu: "2048"
      Memory: "4096"
      EphemeralStorage:
        SizeInGiB: 40
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: python-worker
          Image: !Sub ${PythonWorkerRepository.RepositoryUri}:${ImageTag}
          Essential: true
          StopTimeout: 120
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - !Sub >-
              encoded="$(python -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["DB_PASSWORD"], safe=""))')";
              export DATABASE_URL="postgresql://${DatabaseUsername}:${!encoded}@${!RDS_HOST}:5432/${DatabaseName}";
              exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
          PortMappings:
            - Name: http
              ContainerPort: 8000
              Protocol: tcp
              AppProtocol: http
          Environment:
            - {Name: NODE_ENV, Value: production}
            - {Name: APP_ENV, Value: production}
            - {Name: PYTHON_WORKER_PORT, Value: "8000"}
            - Name: PYTHON_WORKER_URL
              Value: http://python-worker:8000
            - Name: API_BASE_URL
              Value: !Sub https://${PrimaryDomainName}
            - {Name: RDS_HOST, Value: !Ref RdsEndpointAddress}
            - Name: REDIS_URL
              Value: !Sub rediss://${QueueRedis.PrimaryEndPoint.Address}:6379
            - {Name: STORAGE_DRIVER, Value: s3}
            - {Name: S3_BUCKET, Value: !Ref ExistingAssetsBucketName}
            - {Name: S3_ASSETS_BUCKET, Value: !Ref ExistingAssetsBucketName}
            - {Name: S3_PRIVATE_AUDIO_BUCKET, Value: !Ref PrivateAudioBucket}
            - {Name: S3_REGION, Value: !Ref AWS::Region}
            - {Name: S3_FORCE_PATH_STYLE, Value: "false"}
            - {Name: JOB_QUEUE_DRIVER, Value: bullmq}
            - {Name: LIVE_STT_PROVIDER, Value: sherpa}
            - {Name: REPORT_STT_PROVIDER, Value: openai}
            - {Name: REHEARSAL_AUDIO_MAX_BYTES, Value: "25000000"}
            - {Name: OCR_PROVIDER, Value: python}
            - {Name: LLM_PROVIDER, Value: openai}
            - {Name: OPENAI_MODEL, Value: gpt-4.1-mini}
            - {Name: OPENAI_TRANSCRIPTION_MODEL, Value: whisper-1}
            - {Name: OPENAI_EMBEDDING_MODEL, Value: text-embedding-3-small}
            - {Name: AWS_REGION, Value: !Ref AWS::Region}
            - {Name: TRANSCRIBE_LANGUAGE_CODE, Value: ko-KR}
            - {Name: TEXTRACT_ENABLED, Value: "false"}
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbPasswordParameterName}
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAiApiKeyParameterName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref PythonWorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: python-worker

  MigrationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: orbit-production-migration
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: migration
          Image: !Sub ${ApiRepository.RepositoryUri}:${ImageTag}
          Essential: true
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - !Sub >-
              encoded="$(node -p 'encodeURIComponent(process.env.DB_PASSWORD)')";
              export DATABASE_URL="postgresql://${DatabaseUsername}:${!encoded}@${!RDS_HOST}:5432/${DatabaseName}";
              exec pnpm --filter @orbit/api migration:run
          Environment:
            - {Name: NODE_ENV, Value: production}
            - {Name: APP_ENV, Value: production}
            - {Name: RDS_HOST, Value: !Ref RdsEndpointAddress}
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbPasswordParameterName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: migration

  ApiService:
    Type: AWS::ECS::Service
    DependsOn: HttpsListener
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: !If [RunCandidateServices, !Ref ApiDesiredCount, 0]
      TaskDefinition: !Ref ApiTaskDefinition
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref TaskSecurityGroup]
          Subnets: [!Ref AppPrivateSubnetA, !Ref AppPrivateSubnetB]
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 3000
          TargetGroupArn: !Ref GreenTargetGroup
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt ServiceConnectNamespace.Arn

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: !If [RunCandidateServices, !Ref WorkerDesiredCount, 0]
      TaskDefinition: !Ref WorkerTaskDefinition
      EnableExecuteCommand: true
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref TaskSecurityGroup]
          Subnets: [!Ref AppPrivateSubnetA, !Ref AppPrivateSubnetB]
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt ServiceConnectNamespace.Arn

  PythonWorkerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DesiredCount: !If [RunCandidateServices, !Ref PythonWorkerDesiredCount, 0]
      TaskDefinition: !Ref PythonWorkerTaskDefinition
      EnableExecuteCommand: true
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups: [!Ref TaskSecurityGroup]
          Subnets: [!Ref AppPrivateSubnetA, !Ref AppPrivateSubnetB]
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt ServiceConnectNamespace.Arn
        Services:
          - PortName: http
            ClientAliases:
              - Port: 8000
                DnsName: python-worker

  ApiScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: RunCandidateServices
    Properties:
      MinCapacity: 2
      MaxCapacity: 6
      ResourceId: !Join ["/", [service, !Ref Cluster, !GetAtt ApiService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ApiCpuScaling:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: RunCandidateServices
    Properties:
      PolicyName: orbit-production-api-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ApiScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  WorkerScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: RunCandidateServices
    Properties:
      MinCapacity: 1
      MaxCapacity: 4
      ResourceId: !Join ["/", [service, !Ref Cluster, !GetAtt WorkerService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  WorkerCpuScaling:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: RunCandidateServices
    Properties:
      PolicyName: orbit-production-worker-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 65
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  PythonWorkerScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: RunCandidateServices
    Properties:
      MinCapacity: 2
      MaxCapacity: 6
      ResourceId: !Join ["/", [service, !Ref Cluster, !GetAtt PythonWorkerService.Name]]
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PythonWorkerCpuScaling:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: RunCandidateServices
    Properties:
      PolicyName: orbit-production-python-worker-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PythonWorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  AlbFiveXxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ORBIT production ALB 5xx
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  GreenUnhealthyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ORBIT green target health
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt LoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt GreenTargetGroup.TargetGroupFullName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ProductionDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: orbit-main-production-ecs
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 12,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "ALB responses",
                "metrics": [
                  ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${LoadBalancer.LoadBalancerFullName}"],
                  [".", "HTTPCode_ELB_5XX_Count", ".", "."]
                ],
                "period": 60,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "width": 12,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "ECS CPU",
                "metrics": [
                  ["AWS/ECS", "CPUUtilization", "ClusterName", "${Cluster}", "ServiceName", "${ApiService.Name}"],
                  [".", ".", ".", ".", "ServiceName", "${WorkerService.Name}"],
                  [".", ".", ".", ".", "ServiceName", "${PythonWorkerService.Name}"]
                ],
                "period": 60,
                "stat": "Average"
              }
            }
          ]
        }

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ApiServiceName:
    Value: !GetAtt ApiService.Name
  WorkerServiceName:
    Value: !GetAtt WorkerService.Name
  PythonWorkerServiceName:
    Value: !GetAtt PythonWorkerService.Name
  MigrationTaskDefinitionArn:
    Value: !Ref MigrationTaskDefinition
  AppPrivateSubnetAId:
    Value: !Ref AppPrivateSubnetA
  AppPrivateSubnetBId:
    Value: !Ref AppPrivateSubnetB
  TaskSecurityGroupId:
    Value: !Ref TaskSecurityGroup
  LoadBalancerDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  ListenerArn:
    Value: !Ref HttpsListener
  BlueTargetGroupArn:
    Value: !Ref BlueTargetGroup
  GreenTargetGroupArn:
    Value: !Ref GreenTargetGroup
  CandidateUrl:
    Value: !Sub https://${CandidateDomainName}
  PrivateAudioBucketName:
    Value: !Ref PrivateAudioBucket
  ApiRepositoryUri:
    Value: !GetAtt ApiRepository.RepositoryUri
  WorkerRepositoryUri:
    Value: !GetAtt WorkerRepository.RepositoryUri
  PythonWorkerRepositoryUri:
    Value: !GetAtt PythonWorkerRepository.RepositoryUri
  GitHubEcsDeployRoleArn:
    Value: !GetAtt GitHubEcsDeployRole.Arn
  StaticWebBucketName:
    Value: !Ref ExistingStaticWebBucketName
  CloudFrontDistributionId:
    Value: !Ref ExistingCloudFrontDistributionId
  OriginApiDomainName:
    Value: !Ref OriginApiDomainName
